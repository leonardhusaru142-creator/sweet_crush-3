<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Sweet Crush</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin:0; padding:0; box-sizing:border-box; touch-action: none; }
  body {
    background: linear-gradient(180deg, #3a0a5e, #12002b);
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  h1 { font-size: 36px; margin: 15px 0 5px; text-shadow: 0 0 20px #ff00ff; }
  .stats { display: flex; justify-content: space-around; background: rgba(0,0,0,0.5); padding: 10px; margin: 0 20px; border-radius: 15px; }
  canvas { 
    margin: 15px auto; 
    border: 18px solid #fff; 
    border-radius: 30px; 
    box-shadow: 0 25px 60px rgba(0,0,0,0.8);
    background: #1a0033;
    max-width: 96%;
  }
</style>
</head>
<body>
  <h1>🍭 Sweet Crush</h1>
  <div class="stats">
    <div>Nivel: <b id="level">1</b></div>
    <div>Scor: <b id="score">0</b></div>
    <div>Mutări: <b id="moves">20</b></div>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <p style="margin-top:10px; font-size:18px;">👆 Swipe sau click pe bomboane ca să le muți</p>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const SIZE = 50;
const ROWS = 8;
const COLS = 8;
const CANDIES = ['🍒','🍊','🍋','🍇','🫐','🍉','🍓'];

let board = [];
let score = 0, moves = 20, level = 1;

// Create board
function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      board[r][c] = CANDIES[Math.floor(Math.random() * CANDIES.length)];
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.font = '46px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#ffffff';
      ctx.fillText(board[r][c], c * SIZE + SIZE/2, r * SIZE + SIZE/2 + 6);
    }
  }
}

// ==================== INPUT FIX (cel mai important) ====================
let startPos = null;

function getGridPos(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: Math.floor((clientX - rect.left) / SIZE),
    y: Math.floor((clientY - rect.top) / SIZE)
  };
}

// Mouse + Touch Start
canvas.addEventListener('mousedown', (e) => {
  startPos = getGridPos(e);
});

canvas.addEventListener('touchstart', (e) => {
  startPos = getGridPos(e);
}, { passive: true });

// Mouse + Touch End
canvas.addEventListener('mouseup', handleMove);
canvas.addEventListener('touchend', handleMove);

function handleMove(e) {
  if (!startPos) return;
  
  const endPos = getGridPos(e);
  const dx = endPos.x - startPos.x;
  const dy = endPos.y - startPos.y;

  // Dacă a mutat doar o casetă (stânga/dreapta/sus/jos)
  if (Math.abs(dx) + Math.abs(dy) === 1) {
    // Swap
    const temp = board[startPos.y][startPos.x];
    board[startPos.y][startPos.x] = board[endPos.y][endPos.x];
    board[endPos.y][endPos.x] = temp;

    moves--;
    document.getElementById('moves').textContent = moves;
    draw();

    // Aici ar veni logica de match (simplificată momentan)
    console.log("Swap făcut la:", startPos, "→", endPos);
  }

  startPos = null;
}

// Start Game
initBoard();
draw();
</script>
</body>
</html>
