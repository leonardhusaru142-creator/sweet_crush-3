<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Sweet Crush</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Sweet Crush - Joc match-3 distractiv și addictiv!">
<style>
  * { margin:0; padding:0; box-sizing:border-box; touch-action: none; }
  body {
    background: linear-gradient(180deg, #3a0a5e, #12002b);
    font-family: 'Arial', sans-serif;
    color: white;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header { padding: 15px 10px 10px; background: rgba(0,0,0,0.6); }
  h1 { font-size: 38px; text-shadow: 0 0 30px #ff00ff; }
  .stats { display: flex; justify-content: space-around; font-size: 19px; margin: 12px 0; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 15px; }
  canvas { 
    border: 18px solid #fff; 
    border-radius: 30px; 
    box-shadow: 0 30px 70px rgba(0,0,0,0.8);
    background: #1a0033;
    margin: 10px auto;
    max-width: 98%;
    touch-action: none;
  }
  button {
    padding: 16px 40px;
    font-size: 20px;
    margin: 8px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(#ff3366, #cc0033);
    color: white;
    box-shadow: 0 8px 25px rgba(255,50,100,0.6);
  }
</style>
</head>
<body>
  <header>
    <h1>🍭 Sweet Crush</h1>
    <div class="stats">
      <div>Nivel <b id="level">1</b></div>
      <div>Scor <b id="score">0</b></div>
      <div>Mutări <b id="moves">20</b></div>
    </div>
  </header>

  <canvas id="game" width="400" height="400"></canvas>

  <div style="margin-top:10px">
    <button onclick="restartGame()">🔄 Restart Nivel</button>
    <button onclick="giveHint()">💡 Hint</button>
  </div>

<script>
// ==================== SWEET CRUSH - CANDY CRUSH STYLE AAA ====================
const ROWS = 8, COLS = 8, SIZE = 50;
const CANDIES = ['🍒','🍊','🍋','🍇','🫐','🍉','🍓'];

let board = [], score = 0, moves = 20, level = 1, targetScore = 1500;
let combo = 0, particles = [], isProcessing = false;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = COLS * SIZE;
canvas.height = ROWS * SIZE;

// Audio
const bgMusic = new Audio('https://assets.mixkit.co/sfx/preview/2578/2578.wav');
bgMusic.loop = true; bgMusic.volume = 0.5;
bgMusic.play().catch(()=>{});

const sndMatch = new Audio('https://freesound.org/data/previews/387/387186_7258990-lq.mp3');
const sndBomb = new Audio('https://freesound.org/data/previews/276/276952_5123854-lq.mp3');

// Particle System
class Particle {
  constructor(x,y,color) {
    this.x=x; this.y=y; this.vx=Math.random()*12-6; this.vy=Math.random()*12-8;
    this.life=45; this.color=color; this.size=Math.random()*9+5;
  }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.4; this.life--; }
  draw(){
    ctx.globalAlpha = this.life/45;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x,this.y,this.size,this.size);
  }
}

// Initialize Board
function initBoard() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      board[r][c] = {type: CANDIES[Math.floor(Math.random()*CANDIES.length)], special: null};
    }
  }
  // Remove initial matches
  while (findMatches().length > 0) {
    const matches = findMatches();
    matches.forEach(m => board[m.r][m.c].type = CANDIES[Math.floor(Math.random()*CANDIES.length)]);
  }
}

function findMatches() {
  let matches = [];
  // Horizontal
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS-2; c++) {
      if (board[r][c].type && board[r][c].type === board[r][c+1].type && board[r][c].type === board[r][c+2].type) {
        matches.push({r,c},{r,c:c+1},{r,c:c+2});
      }
    }
  }
  // Vertical
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS-2; r++) {
      if (board[r][c].type && board[r][c].type === board[r+1][c].type && board[r][c].type === board[r+2][c].type) {
        matches.push({r,c},{r:r+1,c},{r:r+2,c});
      }
    }
  }
  return [...new Set(matches.map(m=>`${m.r},${m.c}`))].map(s => {
    let [r,c] = s.split(',').map(Number);
    return {r,c};
  });
}

function createExplosion(x, y, count=30, color='#ffff00') {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color));
  }
}

function processMatches() {
  if (isProcessing) return;
  isProcessing = true;
  const matches = findMatches();

  if (matches.length === 0) {
    isProcessing = false;
    if (moves <= 0) gameOver();
    combo = 0;
    return;
  }

  combo++;
  let points = matches.length * 15 * (combo > 1 ? combo : 1);
  score += points;
  document.getElementById('score').textContent = score;

  matches.forEach(m => {
    const candy = board[m.r][m.c];
    const x = m.c * SIZE + SIZE/2;
    const y = m.r * SIZE + SIZE/2;

    if (matches.length >= 5) candy.special = 'colorbomb';
    else if (matches.length >= 4) candy.special = 'bomb';

    createExplosion(x, y, 35, candy.special ? '#ff00ff' : '#ffffff');
    if (candy.special) sndBomb.play();
    else sndMatch.play();

    board[m.r][m.c].type = null;
  });

  setTimeout(() => {
    applyGravity();
    refillBoard();
    setTimeout(() => { isProcessing = false; processMatches(); }, 300);
  }, 250);

  if (score >= targetScore) levelUp();
}

function applyGravity() {
  for (let c = 0; c < COLS; c++) {
    let write = ROWS-1;
    for (let r = ROWS-1; r >= 0; r--) {
      if (board[r][c].type) {
        board[write][c] = board[r][c];
        if (write !== r) board[r][c] = {type: null, special: null};
        write--;
      }
    }
  }
}

function refillBoard() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!board[r][c].type) {
        board[r][c] = {
          type: CANDIES[Math.floor(Math.random()*CANDIES.length)],
          special: null
        };
      }
    }
  }
}

function levelUp() {
  level++;
  targetScore += 1200;
  moves += 8;
  document.getElementById('level').textContent = level;
  document.getElementById('moves').textContent = moves;
  alert(`🎉 Nivel ${level} completat! Felicitări!`);
}

function gameOver() {
  bgMusic.pause();
  alert(`Game Over!\n\nNivel: ${level}\nScor: ${score}\n\nMulțumim că ai jucat Sweet Crush!`);
}

function giveHint() {
  alert("💡 Fă match de 4 sau 5 pentru Power-ups (Bombă / Color Bomb)!\nSwipe pentru a muta bomboanele.");
}

// Input
let startX = null, startY = null;

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: Math.floor((clientX - rect.left) / SIZE),
    y: Math.floor((clientY - rect.top) / SIZE)
  };
}

canvas.addEventListener('touchstart', e => {
  const pos = getPos(e);
  startX = pos.x; startY = pos.y;
});

canvas.addEventListener('touchend', e => {
  if (startX === null) return;
  const pos = getPos(e);
  const dx = pos.x - startX;
  const dy = pos.y - startY;

  if (Math.abs(dx) + Math.abs(dy) === 1) {
    // Swap
    const temp = board[startY][startX];
    board[startY][startX] = board[pos.y][pos.x];
    board[pos.y][pos.x] = temp;
    
    moves--;
    document.getElementById('moves').textContent = moves;
    setTimeout(processMatches, 180);
  }
  startX = null; startY = null;
});

// Draw Loop
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const item = board[r][c];
      if (!item.type) continue;

      const x = c * SIZE + SIZE/2;
      const y = r * SIZE + SIZE/2;

      ctx.shadowBlur = item.special ? 30 : 15;
      ctx.shadowColor = item.special ? '#ffff00' : '#ffffff';
      ctx.font = '52px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(item.type, x, y);
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i,1);
  }
}

function restartGame() {
  score = 0; moves = 20; level = 1; targetScore = 1500;
  document.getElementById('score').textContent = score;
  document.getElementById('moves').textContent = moves;
  document.getElementById('level').textContent = level;
  initBoard();
}

// Start
initBoard();
setInterval(draw, 1000/60);
draw();
</script>
</body>
</html>
